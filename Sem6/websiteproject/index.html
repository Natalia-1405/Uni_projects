<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="CSS/style.css">
        <script type="text/javascript" src="JS/script.js"></script>
        <title>Collection</title>
    </head>

    <body>
        <header>
            <img src="IMG/gem.png"/>
        </header>
        <section>
            <p>✧˖°. Gemstones collection .°˖✧</p>
            <div id="addnew">
                <form id="addGem" action="" method="POST">
                <div>
                    <label for="name">Name:</label>
                    </div>
                    <div>
                        <input type="text" id="name" name="name" required placeholder="Name of the gem"><br>
                    </div>
                    <div>
                    <label for="location">Location:</label>
                    </div>
                    <div>
                        <input type="text" id="location" name="location" required placeholder="Country/Region"><br>
                    </div>
                    <div>
                        <label for="scale">Mohs scale (1-10):</label>
                    </div>
                    <div>
                        <input type="number" id="scale" name="scale" required placeholder="1-10" min="1" max="10" step="0.5"><br>
                    </div>
                    <div>
                        <label for="color">Color:</label>
                    </div>
                    <div>
                        <input type="text" id="color" name="color" required placeholder="Color"><br>
                    </div>
                    <div>
                        <input id="submit" type="submit" value="Add"/>
                        <input id="reset" type="reset" value="Reset"/>
                        <div id="tableGems">
                            <a href="http://localhost/projekt/php/table.php">Table of gemstones</a>
                        </div>
                    </div>
                </form>
            </div>
            <p id="info" style="color: orange; font-size: 15px"></p>
        </section>            
    </body>
</html>
</html>
